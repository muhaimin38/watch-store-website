<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChronoHub-Checkout</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

<!-- 🔷 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
<div class="container">

    <a class="navbar-brand fw-bold" href="index.html">
        ChronoHub
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">

            <li class="nav-item">
                <a class="nav-link " href="index.html">HOME</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="shop.html">SHOP</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="cart.html">
                    CART <span id="cart-count" class="badge bg-danger">0</span>
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link active" href="checkout.html">CHECKOUT</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="about.html">ABOUT</a>
            </li>

        </ul>
    </div>

</div>
</nav>

<!-- 🔷 TITLE -->
<div class="container mt-4">
    <h2>Checkout</h2>
    <p class="text-muted">Enter your details to complete purchase</p>
</div>



<!-- 🔷 FORM -->
<div class="container mt-4">
        <!-- ORDER SUMMARY -->
    <div class="alert alert-info">
        <h5>Order Summary</h5>

        <div id="order-summary"></div>

        <h5 class="mt-2">
            Total: $<span id="total">0</span>
        </h5>
    </div>
    <form>

        <div class="row">

            <!-- Billing Info -->
            <div class="col-md-6">
                <h4>Billing Details</h4>

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="Enter email">
                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <input type="text" class="form-control" placeholder="Enter address">
                </div>

            </div>

            <!-- Payment Info -->
            <div class="col-md-6">
                <h4>Payment Method</h4>

                <!-- Radio Buttons -->
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="payment" checked>
                    <label class="form-check-label">Credit Card</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="payment">
                    <label class="form-check-label">Cash on Delivery</label>
                </div>

                <!-- Card Info -->
                <div class="mt-3">
                    <label class="form-label">Card Number</label>
                    <input type="text" class="form-control" placeholder="1234 5678 9012 3456">
                </div>

                <div class="row mt-3">
                    <div class="col">
                        <input type="text" class="form-control" placeholder="Expiry">
                    </div>
                    <div class="col">
                        <input type="text" class="form-control" placeholder="CVV">
                    </div>
                </div>

            </div>

        </div>
        <div class="container mt-4">

        <!-- Submit -->
        <button type="button" class="btn btn-success btn-lg w-100" onclick="placeOrder()">Place Order</button>

    </form>
</div>

<!-- 🔷 FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    <p>&copy; © 2026 ChronoHub</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

function getCart() {
    return JSON.parse(localStorage.getItem("cart")) || [];
}

function updateCartCount() {
    let count = document.getElementById("cart-count");
    if (count) count.innerText = getCart().length;
}

function renderCheckout() {

    let cart = getCart();
    let summary = document.getElementById("order-summary");
    let total = 0;

    summary.innerHTML = "";

    if (cart.length === 0) {
        summary.innerHTML = "<p class='text-danger'>Your cart is empty</p>";
        document.getElementById("total").innerText = 0;
        document.getElementById("item-count").innerText = 0;
        return;
    }

    for (let i = 0; i < cart.length; i++) {

        summary.innerHTML +=
            "<div class='d-flex justify-content-between border-bottom py-1'>" +
            "<span>" + cart[i].name + "</span>" +
            "<span>$" + cart[i].price + "</span>" +
            "</div>";

        total += cart[i].price;
    }

    document.getElementById("total").innerText = total;
    document.getElementById("item-count").innerText = cart.length;
}

function placeOrder() {

    let cart = getCart();

    if (cart.length === 0) {
        alert("Cart is empty");
        return;
    }

    alert("Order placed successfully");

    localStorage.removeItem("cart");

    window.location.href = "index.html";
}

updateCartCount();
renderCheckout();

</script>

</body>
</html>
