<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Watch Store - Checkout</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

<!-- 🔷 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">WatchStore</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
                <li class="nav-item"><a class="nav-link active" href="#">Checkout</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="adminDashboard.html">Admin </a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- 🔷 TITLE -->
<div class="container mt-4">
    <h2>Checkout</h2>
    <p class="text-muted">Enter your details to complete purchase</p>
</div>

<!-- 🔷 FORM -->
<div class="container mt-4">
    <form>

        <div class="row">

            <!-- Billing Info -->
            <div class="col-md-6">
                <h4>Billing Details</h4>

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="Enter email">
                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <input type="text" class="form-control" placeholder="Enter address">
                </div>

            </div>

            <!-- Payment Info -->
            <div class="col-md-6">
                <h4>Payment Method</h4>

                <!-- Radio Buttons -->
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="payment" checked>
                    <label class="form-check-label">Credit Card</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="payment">
                    <label class="form-check-label">Cash on Delivery</label>
                </div>

                <!-- Card Info -->
                <div class="mt-3">
                    <label class="form-label">Card Number</label>
                    <input type="text" class="form-control" placeholder="1234 5678 9012 3456">
                </div>

                <div class="row mt-3">
                    <div class="col">
                        <input type="text" class="form-control" placeholder="Expiry">
                    </div>
                    <div class="col">
                        <input type="text" class="form-control" placeholder="CVV">
                    </div>
                </div>

            </div>

        </div>

        <!-- Submit -->
        <div class="mt-4 text-end">
            <button class="btn btn-success btn-lg">Place Order</button>
        </div>

    </form>
</div>

<!-- 🔷 FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    <p>&copy; 2026 WatchStore</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
