<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChronoHub-Product Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<div class="row g-4">

<!-- IMAGE -->
<div class="col-md-6">
    <img id="img" class="img-fluid rounded shadow">
</div>

<!-- DETAILS -->
<div class="col-md-6">

    <h2 id="name" class="fw-bold"></h2>

    <p id="category" class="text-muted"></p>

    <h4 id="price" class="text-success fw-bold"></h4>

    <p id="desc" class="text-muted"></p>

    <p class="mb-1">Stock</p>
    <div class="progress mb-3">
        <div id="stock" class="progress-bar bg-success"></div>
    </div>

    <button class="btn btn-dark w-100 mb-2" onclick="addToCart()">
        Add to Cart
    </button>

</div>

</div>
</div>

<script>

const products = [
    {
        id: 1,
        name: "Classic Luxury Watch",
        price: 120,
        img: "https://images.unsplash.com/photo-1524805444758-089113d48a6d",
        desc: "Elegant stainless steel watch with premium design.",
        category: "Luxury",
        stock: 70
    },
    {
        id: 2,
        name: "Sport Watch",
        price: 90,
        img: "sportswatch.jpg",
        desc: "Shock resistant watch for sports use.",
        category: "Sports",
        stock: 60
    },
    {
        id: 3,
        name: "Digital Watch",
        price: 60,
        img: "https://images.unsplash.com/photo-1508685096489-7aacd43bd3b1",
        desc: "Modern LED digital watch.",
        category: "Digital",
        stock: 80
    },
    {
        id: 4,
        name: "Luxury Gold Watch",
        price: 200,
        img: "https://images.unsplash.com/photo-1547996160-81dfa63595aa",
        desc: "Premium gold plated luxury watch.",
        category: "Luxury",
        stock: 40
    }
];

function getCart() {
    return JSON.parse(localStorage.getItem("cart")) || [];
}

function saveCart(cart) {
    localStorage.setItem("cart", JSON.stringify(cart));
}

// GET PRODUCT
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let product = products.find(p => p.id == id);

if (!product) {
    document.body.innerHTML = "<h2 class='text-center mt-5'>Product Not Found</h2>";
}

// DISPLAY PRODUCT
document.getElementById("name").innerText = product.name;
document.getElementById("price").innerText = "$" + product.price;
document.getElementById("img").src = product.img;
document.getElementById("desc").innerText = product.desc;
document.getElementById("category").innerText = "Category: " + product.category;

// STOCK
document.getElementById("stock").style.width = product.stock + "%";
document.getElementById("stock").innerText = product.stock + "%";

// ADD TO CART (FIXED)
function addToCart() {

    let cart = getCart();

    let existing = cart.find(item => item.name === product.name);

    if (existing) {
        existing.qty += 1;
    } else {
        cart.push({
            name: product.name,
            price: product.price,
            image: product.img,
            qty: 1
        });
    }

    saveCart(cart);

    alert("Added to cart");
}

</script>

</body>
</html>
