<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChronoHub-Cart</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

<!--  NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
<div class="container">

    <a class="navbar-brand fw-bold" href="index.html">
        ChronoHub
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">

            <li class="nav-item">
                <a class="nav-link " href="index.html">HOME</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="shop.html">SHOP</a>
            </li>

            <li class="nav-item">
                <a class="nav-link active" href="cart.html">
                    CART <span id="cart-count" class="badge bg-danger">0</span>
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="checkout.html">CHECKOUT</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="about.html">ABOUT</a>
            </li>

        </ul>
    </div>

</div>
</nav>

<!--  TITLE -->
<div class="container mt-4">
    <h2>Your Cart</h2>
    <p class="text-muted">Review your selected items</p>
</div>

<!--  TABLE -->
<div class="container mt-4">
    <div class="table-responsive">
        <table class="table table-bordered table-striped text-center align-middle">

            <thead class="table-dark">
                <tr>
                    <th>Product</th>
                    <th>Image</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="cart-items">

                <tr>
                    <td>Classic Watch</td>
                    <td><img src="https://via.placeholder.com/80"></td>
                    <td>$120</td>
                    <td>
                        <input type="number" class="form-control" value="1" min="1">
                    </td>
                    <td>$120</td>
                    <td>
                        <button class="btn btn-danger btn-sm">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>Sport Watch</td>
                    <td><img src="https://via.placeholder.com/80"></td>
                    <td>$90</td>
                    <td>
                        <input type="number" class="form-control" value="2" min="1">
                    </td>
                    <td>$180</td>
                    <td>
                        <button class="btn btn-danger btn-sm">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>

            </tbody>

        </table>
    </div>
</div>

<!--  TOTAL + CHECKOUT -->
<div class="container mt-4 text-end">
    <h4>Total: $<span id="total">0</span></h4>
    <a href="checkout.html" class="btn btn-success">Proceed to Checkout</a>
</div>

<!--  FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    <p>&copy; © 2026 ChronoHub</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

function getCart() {
    return JSON.parse(localStorage.getItem("cart")) || [];
}

function saveCart(cart) {
    localStorage.setItem("cart", JSON.stringify(cart));
}

let cart = getCart();

function renderCart() {

    cart = getCart();

    let container = document.getElementById("cart-items");
    container.innerHTML = "";

    let total = 0;

    cart.forEach((item, index) => {

        let itemTotal = item.price * item.qty;
        total += itemTotal;

        container.innerHTML += `
        <tr>
            <td>${item.name}</td>
            <td><img src="${item.image}" width="80"></td>
            <td>$${item.price}</td>
            <td>
                <input type="number" min="1" value="${item.qty}" 
                onchange="updateQty(${index}, this.value)" class="form-control">
            </td>
            <td>$${itemTotal}</td>
            <td>
                <button class="btn btn-danger btn-sm" onclick="removeItem(${index})">
                    <i class="bi bi-trash"></i>
                </button>
            </td>
        </tr>
        `;
    });

    document.getElementById("total").innerText = total;
    updateCartCount();
}

function updateQty(index, qty) {
    cart[index].qty = parseInt(qty);
    saveCart(cart);
    renderCart();
}

function removeItem(index) {
    cart.splice(index, 1);
    saveCart(cart);
    renderCart();
}

function updateCartCount() {
    const count = document.getElementById("cart-count");
    if (count) {
        count.innerText = cart.reduce((sum, item) => sum + item.qty, 0);
    }
}

renderCart();

</script>

</body>
</html>
