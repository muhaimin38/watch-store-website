</head>

<body>

<!--  NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">WatchStore</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                <li class="nav-item"><a class="nav-link active" href="#">Cart <span class="badge bg-danger">3</span></a></li>
                <li class="nav-item"><a class="nav-link" href="checkout.html">Checkout</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>

        </div>

<!--  TITLE -->
<div class="container mt-4">
    <h2>Your Cart</h2>
    <p class="text-muted">Review your selected items</p>
</div>

<!--  TABLE -->
<div class="container mt-4">
    <div class="table-responsive">
        <table class="table table-bordered table-striped text-center align-middle">

            <thead class="table-dark">
                <tr>
                    <th>Product</th>
                    <th>Image</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>Classic Watch</td>
                    <td><img src="https://via.placeholder.com/80"></td>
                    <td>$120</td>
                    <td>
                        <input type="number" class="form-control" value="1" min="1">
                    </td>
                    <td>$120</td>
                    <td>
                        <button class="btn btn-danger btn-sm">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>Sport Watch</td>
                    <td><img src="https://via.placeholder.com/80"></td>
                    <td>$90</td>
                    <td>
                        <input type="number" class="form-control" value="2" min="1">
                    </td>
                    <td>$180</td>
                    <td>
                        <button class="btn btn-danger btn-sm">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>

            </tbody>

        </table>
    </div>
</div>

<!--  TOTAL + CHECKOUT -->
<div class="container mt-4 text-end">
