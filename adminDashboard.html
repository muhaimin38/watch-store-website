<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f0f0f, #1f2c3a);
    color: white;
}
.table-box {
    background: white;
    color: black;
    border-radius: 10px;
    padding: 20px;
}
</style>

</head>
<body>

<script>
// 🔒 SIMPLE PASSWORD PROTECTION
let pass = prompt("Enter Admin Password");
if(pass !== "admin123"){
    document.body.innerHTML = "<h1 class='text-center mt-5'>Access Denied</h1>";
}
</script>

<nav class="navbar navbar-dark bg-dark">
<div class="container d-flex justify-content-between">
    <span class="navbar-brand">Admin Panel</span>
    <a href="index.html" class="btn btn-light btn-sm">Back</a>
</div>
</nav>

<div class="container mt-4">
    <h2>Manage Products</h2>
</div>

<!-- ADD PRODUCT -->
<div class="container mt-3">
<div class="table-box">

<h5>Add New Product</h5>

<input id="name" class="form-control mb-2" placeholder="Product Name">
<input id="price" class="form-control mb-2" placeholder="Price">
<input id="image" class="form-control mb-2" placeholder="Image URL">
<input id="stock" class="form-control mb-2" placeholder="Stock">

<button class="btn btn-success" onclick="addProduct()">Add Product</button>

</div>
</div>

<!-- TABLE -->
<div class="container mt-4">
<div class="table-box">

<h5>Product List</h5>

<table class="table text-center">
<thead class="table-dark">
<tr>
<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Stock</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table-body"></tbody>

</table>

</div>
</div>

<script>

// GET PRODUCTS
function getProducts(){
    return JSON.parse(localStorage.getItem("products")) || [];
}

// SAVE
function saveProducts(products){
    localStorage.setItem("products", JSON.stringify(products));
}

// ADD PRODUCT
function addProduct(){

    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;
    let image = document.getElementById("image").value;
    let stock = document.getElementById("stock").value;

    let products = getProducts();

    let id = products.length + 1;

    products.push({
        id, name, price, image, stock
    });

    saveProducts(products);
    render();

    alert("Product Added");
}

// DELETE
function deleteProduct(index){
    let products = getProducts();
    products.splice(index,1);
    saveProducts(products);
    render();
}

// RENDER TABLE
function render(){

    let products = getProducts();
    let body = document.getElementById("table-body");

    body.innerHTML = "";

    products.forEach((p, i) => {

        body.innerHTML += `
        <tr>
            <td>${p.id}</td>
            <td>${p.name}</td>
            <td>$${p.price}</td>
            <td>${p.stock}</td>
            <td>
                <button class="btn btn-danger btn-sm" onclick="deleteProduct(${i})">
                    <i class="bi bi-trash"></i>
                </button>
            </td>
        </tr>
        `;
    });
}

render();

</script>

</body>
</html>
